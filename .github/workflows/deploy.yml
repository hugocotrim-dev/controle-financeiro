name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - dev # Quando houver push na branch dev, roda isso
  workflow_dispatch: # Permite rodar manualmente se quiser

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar (Build) o App em Produção
        run: npm run build -- --configuration=production --base-href="https://hugocotrim-dev.github.io/controle-financeiro/"

      - name: Configurar o Pages
        uses: actions/configure-pages@v4

      - name: Enviar o build para os servidores do GitHub
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/controle-financeiro-app' # Caminho que o Angular salva o site final

      - name: Fazer Deploy!
        id: deployment
        uses: actions/deploy-pages@v4
